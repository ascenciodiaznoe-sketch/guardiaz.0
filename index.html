<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardiaZ - Sistema de Inventario</title>
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Inventario">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%232563eb'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white' font-family='Arial, sans-serif' font-weight='bold'%3E📦%3C/text%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active {
            border-bottom: 3px solid #3b82f6;
            color: #3b82f6;
        }
        .install-prompt {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2563eb;
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
            display: none;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        
        /* Mejoras para móvil vertical */
        @media (max-width: 768px) {
            .tab-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }
            .tab-container::-webkit-scrollbar {
                display: none;
            }
            .tab-button {
                white-space: nowrap;
                font-size: 0.875rem;
                padding: 12px 16px;
            }
            .mobile-compact {
                padding: 12px !important;
            }
            .mobile-text-sm {
                font-size: 0.875rem;
            }
            .mobile-grid {
                grid-template-columns: 1fr !important;
            }
            .mobile-hidden {
                display: none;
            }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- PeerJS para conexión directa -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <!-- QRCode.js para generar códigos QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- QR Scanner para leer códigos QR -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <script type="text/babel">

        const { useState, useEffect } = React;

        function InventorySystem() {
            // Estado principal
            const [activeTab, setActiveTab] = useState('inventory');
            const [expandedRecipes, setExpandedRecipes] = useState({});
            const [expandedHistory, setExpandedHistory] = useState({});
            const [parts, setParts] = useState([]);
            const [recipes, setRecipes] = useState([]);
            const [assemblyHistory, setAssemblyHistory] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [serialNumbers, setSerialNumbers] = useState({});
            const [searchSerial, setSearchSerial] = useState('');
            
            // Estados para organización y colapso de secciones
            const [showInventoryStock, setShowInventoryStock] = useState(true);
            const [showAddComponent, setShowAddComponent] = useState(false);
            const [showRecipesList, setShowRecipesList] = useState(true);
            const [showCreateRecipe, setShowCreateRecipe] = useState(false);
            const [historySortBy, setHistorySortBy] = useState('date');
            const [reportsFilter, setReportsFilter] = useState('all');
            
            // Estados para edición de recetas
            const [editingRecipeId, setEditingRecipeId] = useState(null);
            const [editRecipeForm, setEditRecipeForm] = useState({ name: '', components: [] });
            const [searchPartForRecipe, setSearchPartForRecipe] = useState('');
            
            // Estados para quitar stock
            const [removingStockPartId, setRemovingStockPartId] = useState(null);
            const [stockToRemove, setStockToRemove] = useState('');

            // Estados para conexión P2P
            const [peer, setPeer] = useState(null);
            const [myPeerId, setMyPeerId] = useState('');
            const [connection, setConnection] = useState(null);
            const [isConnected, setIsConnected] = useState(false);
            const [connectToPeerId, setConnectToPeerId] = useState('');
            const [connectionStatus, setConnectionStatus] = useState('disconnected');
            const [showQR, setShowQR] = useState(false);
            const [showScanner, setShowScanner] = useState(false);
            const [pendingConnection, setPendingConnection] = useState(null);
            const [showDataChoice, setShowDataChoice] = useState(false);

            // Estados para formularios
            const [newPart, setNewPart] = useState({ name: '', quantity: 0, unit: 'unidades', price: 0, minStock: 5, supplier: '' });
            const [quickAddMode, setQuickAddMode] = useState(false);
            const [newRecipe, setNewRecipe] = useState({ name: '', components: [] });
            const [selectedPart, setSelectedPart] = useState('');
            const [partQuantity, setPartQuantity] = useState(1);
            const [editingPartId, setEditingPartId] = useState(null);
            const [editingQuantity, setEditingQuantity] = useState('');
            const [addingStockPartId, setAddingStockPartId] = useState(null);
            const [stockToAdd, setStockToAdd] = useState('');
            
            // Estados para edición completa de producto
            const [editingFullPart, setEditingFullPart] = useState(null);
            const [editForm, setEditForm] = useState({
                name: '',
                quantity: 0,
                unit: 'unidades',
                price: 0,
                minStock: 5,
                supplier: ''
            });
            const [newSupplierName, setNewSupplierName] = useState('');
            
            // Estado para vista de proveedores
            const [selectedSupplier, setSelectedSupplier] = useState('all');

            // Cargar datos del almacenamiento persistente e inicializar PeerJS
            useEffect(() => {
                loadData();
                initializePeer();
                
                return () => {
                    // Cleanup
                    if (peer) {
                        peer.destroy();
                    }
                };
            }, []);

            // Inicializar PeerJS
            const initializePeer = () => {
                try {
                    const newPeer = new Peer({
                        config: {
                            iceServers: [
                                { urls: 'stun:stun.l.google.com:19302' },
                                { urls: 'stun:global.stun.twilio.com:3478' }
                            ]
                        }
                    });

                    newPeer.on('open', (id) => {
                        setMyPeerId(id);
                        setPeer(newPeer);
                        console.log('Mi ID:', id);
                    });

                    newPeer.on('connection', (conn) => {
                        setupConnection(conn);
                    });

                    newPeer.on('error', (err) => {
                        console.error('Error PeerJS:', err);
                        setConnectionStatus('error');
                    });
                } catch (error) {
                    console.error('Error inicializando peer:', error);
                }
            };

            const loadData = () => {
                try {
                    const partsData = localStorage.getItem('inventory-parts');
                    const recipesData = localStorage.getItem('inventory-recipes');
                    const historyData = localStorage.getItem('inventory-history');
                    const suppliersData = localStorage.getItem('inventory-suppliers');
                    
                    if (partsData) setParts(JSON.parse(partsData));
                    if (recipesData) setRecipes(JSON.parse(recipesData));
                    if (historyData) setAssemblyHistory(JSON.parse(historyData));
                    if (suppliersData) setSuppliers(JSON.parse(suppliersData));
                } catch (error) {
                    console.log('Iniciando con datos vacíos', error);
                }
            };

            // Importar un respaldo JSON (descargado previamente) y restaurarlo
            const importarRespaldoJSON = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const contenido = JSON.parse(e.target.result);

                        const nuevasParts = contenido.parts ? JSON.parse(contenido.parts) : [];
                        const nuevasRecipes = contenido.recipes ? JSON.parse(contenido.recipes) : [];
                        const nuevoHistory = contenido.history ? JSON.parse(contenido.history) : [];
                        const nuevosSuppliers = contenido.suppliers ? JSON.parse(contenido.suppliers) : [];

                        const confirmar = window.confirm(
                            `¿Restaurar este respaldo?\n\n` +
                            `📦 Componentes: ${nuevasParts.length}\n` +
                            `📋 Recetas: ${nuevasRecipes.length}\n` +
                            `📊 Historial: ${nuevoHistory.length}\n` +
                            `🏪 Proveedores: ${nuevosSuppliers.length}\n\n` +
                            `Esto va a REEMPLAZAR lo que tengas guardado actualmente en este dispositivo.`
                        );

                        if (!confirmar) {
                            event.target.value = '';
                            return;
                        }

                        setParts(nuevasParts);
                        setRecipes(nuevasRecipes);
                        setAssemblyHistory(nuevoHistory);
                        setSuppliers(nuevosSuppliers);

                        localStorage.setItem('inventory-parts', JSON.stringify(nuevasParts));
                        localStorage.setItem('inventory-recipes', JSON.stringify(nuevasRecipes));
                        localStorage.setItem('inventory-history', JSON.stringify(nuevoHistory));
                        localStorage.setItem('inventory-suppliers', JSON.stringify(nuevosSuppliers));

                        alert('✅ Respaldo restaurado correctamente');
                    } catch (err) {
                        alert('❌ No se pudo leer este archivo. Asegúrate de que sea un respaldo válido de GuardiaZ.\n\nError: ' + err.message);
                    }
                    event.target.value = '';
                };
                reader.readAsText(file);
            };

            const saveData = (newParts, newRecipes, newHistory) => {
                try {
                    if (newParts !== null) {
                        localStorage.setItem('inventory-parts', JSON.stringify(newParts));
                        if (connection && connection.open) {
                            connection.send({ type: 'parts', data: newParts });
                        }
                    }
                    if (newRecipes !== null) {
                        localStorage.setItem('inventory-recipes', JSON.stringify(newRecipes));
                        if (connection && connection.open) {
                            connection.send({ type: 'recipes', data: newRecipes });
                        }
                    }
                    if (newHistory !== null) {
                        localStorage.setItem('inventory-history', JSON.stringify(newHistory));
                        if (connection && connection.open) {
                            connection.send({ type: 'history', data: newHistory });
                        }
                    }
                    
                    // Actualizar lista de proveedores automáticamente
                    if (newParts) {
                        const uniqueSuppliers = [...new Set(newParts.map(p => p.supplier).filter(s => s))];
                        const updatedSuppliers = uniqueSuppliers.map(name => ({
                            name: name,
                            id: name.toLowerCase().replace(/\s+/g, '-')
                        }));
                        setSuppliers(updatedSuppliers);
                        localStorage.setItem('inventory-suppliers', JSON.stringify(updatedSuppliers));
                    }
                } catch (error) {
                    console.error('Error guardando datos:', error);
                }
            };

            // Agregar componente al inventario
            const addPart = () => {
                if (!newPart.name || newPart.quantity < 0) return;
                
                const existingIndex = parts.findIndex(p => p.name.toLowerCase() === newPart.name.toLowerCase());
                let updatedParts;
                
                if (existingIndex >= 0) {
                    // Pieza ya existe - solo actualizar cantidad y precio (NO stock mínimo)
                    updatedParts = [...parts];
                    updatedParts[existingIndex].quantity += parseFloat(newPart.quantity);
                    // Actualizar precio si se proporciona uno nuevo
                    if (newPart.price > 0) {
                        updatedParts[existingIndex].price = parseFloat(newPart.price);
                    }
                    // NO modificar el stock mínimo de una pieza existente
                } else {
                    // Pieza nueva - crear con todos los datos
                    updatedParts = [...parts, { 
                        ...newPart, 
                        id: Date.now(), 
                        quantity: parseFloat(newPart.quantity),
                        price: parseFloat(newPart.price) || 0,
                        minStock: parseFloat(newPart.minStock) || 5
                    }];
                }
                
                setParts(updatedParts);
                saveData(updatedParts, null, null);
                setNewPart({ name: '', quantity: 0, unit: newPart.unit, price: 0, minStock: newPart.minStock });
                
                // Auto-focus en el campo de nombre después de agregar
                setTimeout(() => {
                    document.getElementById('part-name-input')?.focus();
                }, 100);
            };

            // Manejar Enter key en el formulario
            const handlePartFormKeyPress = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addPart();
                }
            };

            // Eliminar componente
            const deletePart = (id) => {
                const part = parts.find(p => p.id === id);
                if (!part) return;
                
                // Verificar si el componente está siendo usado en alguna receta
                const usedInRecipes = recipes.filter(recipe => 
                    recipe.components.some(comp => comp.partId === id)
                );
                
                if (usedInRecipes.length > 0) {
                    const recipeNames = usedInRecipes.map(r => r.name).join(', ');
                    const confirmDelete = window.confirm(
                        `⚠️ ADVERTENCIA: "${part.name}" está siendo usado en estas recetas:\n\n${recipeNames}\n\n` +
                        `Si lo eliminas, esas recetas dejarán de funcionar correctamente.\n\n¿Estás seguro de continuar?`
                    );
                    if (!confirmDelete) return;
                }
                
                const updatedParts = parts.filter(p => p.id !== id);
                setParts(updatedParts);
                saveData(updatedParts, null, null);
                alert(`✅ Componente "${part.name}" eliminado del inventario`);
            };

            // Iniciar edición de cantidad
            const startEditQuantity = (partId, currentQuantity) => {
                setEditingPartId(partId);
                setEditingQuantity(currentQuantity.toString());
            };

            // Guardar cantidad editada
            const saveEditedQuantity = (partId) => {
                const newQuantity = parseFloat(editingQuantity);
                
                if (isNaN(newQuantity) || newQuantity < 0) {
                    alert('⚠️ Por favor ingresa una cantidad válida');
                    return;
                }

                const updatedParts = parts.map(part => 
                    part.id === partId ? { ...part, quantity: newQuantity } : part
                );

                setParts(updatedParts);
                saveData(updatedParts, null, null);
                setEditingPartId(null);
                setEditingQuantity('');
            };

            // Cancelar edición
            const cancelEditQuantity = () => {
                setEditingPartId(null);
                setEditingQuantity('');
            };

            // Manejar Enter y Escape en edición
            const handleQuantityKeyPress = (e, partId) => {
                if (e.key === 'Enter') {
                    saveEditedQuantity(partId);
                } else if (e.key === 'Escape') {
                    cancelEditQuantity();
                }
            };

            // Iniciar modo agregar stock
            const startAddStock = (partId) => {
                setAddingStockPartId(partId);
                setStockToAdd('');
            };

            // Guardar stock agregado
            const saveAddedStock = (partId) => {
                const amountToAdd = parseFloat(stockToAdd);
                
                if (isNaN(amountToAdd) || amountToAdd <= 0) {
                    alert('⚠️ Por favor ingresa una cantidad válida mayor a 0');
                    return;
                }

                const updatedParts = parts.map(part => {
                    if (part.id === partId) {
                        return { ...part, quantity: part.quantity + amountToAdd };
                    }
                    return part;
                });

                setParts(updatedParts);
                saveData(updatedParts, null, null);
                setAddingStockPartId(null);
                setStockToAdd('');
                
                const part = parts.find(p => p.id === partId);
                alert(`✅ Se agregaron ${amountToAdd} ${part.unit} a ${part.name}`);
            };

            // Cancelar agregar stock
            const cancelAddStock = () => {
                setAddingStockPartId(null);
                setStockToAdd('');
            };

            // Manejar Enter y Escape en agregar stock
            const handleAddStockKeyPress = (e, partId) => {
                if (e.key === 'Enter') {
                    saveAddedStock(partId);
                } else if (e.key === 'Escape') {
                    cancelAddStock();
                }
            };

            // ============ FUNCIONES DE QUITAR STOCK ============
            
            // Iniciar quitar stock
            const startRemoveStock = (partId) => {
                setRemovingStockPartId(partId);
                setStockToRemove('');
            };

            // Guardar stock quitado
            const saveRemovedStock = (partId) => {
                const part = parts.find(p => p.id === partId);
                if (!part) return;
                
                const amountToRemove = parseFloat(stockToRemove);
                if (isNaN(amountToRemove) || amountToRemove <= 0) {
                    alert('⚠️ Ingresa una cantidad válida');
                    return;
                }
                
                if (amountToRemove > part.quantity) {
                    alert(`⚠️ No puedes quitar más de lo que tienes (${part.quantity} ${part.unit})`);
                    return;
                }
                
                const newQuantity = part.quantity - amountToRemove;
                const updatedParts = parts.map(p => 
                    p.id === partId ? { ...p, quantity: newQuantity } : p
                );
                
                // Registrar en historial
                const historyEntry = {
                    id: Date.now(),
                    type: 'removal',
                    partName: part.name,
                    quantity: amountToRemove,
                    unit: part.unit,
                    date: new Date().toISOString(),
                    reason: 'Descuento manual'
                };
                
                const updatedHistory = [historyEntry, ...assemblyHistory];
                
                setParts(updatedParts);
                setAssemblyHistory(updatedHistory);
                saveData(updatedParts, null, updatedHistory);
                
                setRemovingStockPartId(null);
                setStockToRemove('');
                alert(`✅ Se quitaron ${amountToRemove} ${part.unit} de ${part.name}`);
            };

            // Cancelar quitar stock
            const cancelRemoveStock = () => {
                setRemovingStockPartId(null);
                setStockToRemove('');
            };

            // Manejar Enter y Escape en quitar stock
            const handleRemoveStockKeyPress = (e, partId) => {
                if (e.key === 'Enter') {
                    saveRemovedStock(partId);
                } else if (e.key === 'Escape') {
                    cancelRemoveStock();
                }
            };

            // ============ FUNCIONES DE EDICIÓN COMPLETA ============
            
            // Iniciar edición completa de producto
            const startFullEdit = (partId) => {
                const part = parts.find(p => p.id === partId);
                if (!part) return;
                
                setEditingFullPart(partId);
                setEditForm({
                    name: part.name,
                    quantity: part.quantity,
                    unit: part.unit,
                    price: part.price || 0,
                    minStock: part.minStock || 5,
                    supplier: part.supplier || ''
                });
            };

            // Guardar edición completa
            const saveFullEdit = () => {
                if (!editForm.name.trim()) {
                    alert('⚠️ El nombre no puede estar vacío');
                    return;
                }

                if (editForm.quantity < 0) {
                    alert('⚠️ La cantidad no puede ser negativa');
                    return;
                }

                const updatedParts = parts.map(part => {
                    if (part.id === editingFullPart) {
                        return {
                            ...part,
                            name: editForm.name.trim(),
                            quantity: parseFloat(editForm.quantity) || 0,
                            unit: editForm.unit,
                            price: parseFloat(editForm.price) || 0,
                            minStock: parseFloat(editForm.minStock) || 5,
                            supplier: editForm.supplier.trim()
                        };
                    }
                    return part;
                });

                setParts(updatedParts);
                saveData(updatedParts, null, null);
                setEditingFullPart(null);
                alert('✅ Componente actualizado correctamente');
            };

            // Cancelar edición completa
            const cancelFullEdit = () => {
                setEditingFullPart(null);
            };

            // ============ FUNCIONES DE CONEXIÓN P2P ============
            
            // Configurar conexión
            const setupConnection = (conn) => {
                conn.on('open', () => {
                    setPendingConnection(conn);
                    setShowDataChoice(true);
                    setConnectionStatus('connected');
                });

                conn.on('data', (data) => {
                    // Recibir actualizaciones solo si ya aceptamos
                    if (isConnected && connection) {
                        if (data.type === 'parts') {
                            setParts(data.data);
                            localStorage.setItem('inventory-parts', JSON.stringify(data.data));
                        } else if (data.type === 'recipes') {
                            setRecipes(data.data);
                            localStorage.setItem('inventory-recipes', JSON.stringify(data.data));
                        } else if (data.type === 'history') {
                            setAssemblyHistory(data.data);
                            localStorage.setItem('inventory-history', JSON.stringify(data.data));
                        }
                    }
                });

                conn.on('close', () => {
                    setIsConnected(false);
                    setConnection(null);
                    setConnectionStatus('disconnected');
                    alert('⚠️ Desconectado del equipo');
                });

                conn.on('error', (err) => {
                    console.error('Error de conexión:', err);
                    setConnectionStatus('error');
                });
            };

            // Aceptar datos del equipo
            const acceptTeamData = (useTheirData) => {
                const conn = pendingConnection;
                
                if (useTheirData) {
                    // Pedir datos al otro peer
                    conn.send({ type: 'request-data' });
                    
                    // Escuchar su respuesta UNA VEZ
                    const dataHandler = (data) => {
                        if (data.type === 'parts') {
                            setParts(data.data);
                            localStorage.setItem('inventory-parts', JSON.stringify(data.data));
                        } else if (data.type === 'recipes') {
                            setRecipes(data.data);
                            localStorage.setItem('inventory-recipes', JSON.stringify(data.data));
                        } else if (data.type === 'history') {
                            setAssemblyHistory(data.data);
                            localStorage.setItem('inventory-history', JSON.stringify(data.data));
                        }
                    };
                    
                    conn.once('data', dataHandler);
                } else {
                    // Enviar MIS datos al otro peer
                    conn.send({ type: 'parts', data: parts });
                    conn.send({ type: 'recipes', data: recipes });
                    conn.send({ type: 'history', data: assemblyHistory });
                }
                
                setConnection(conn);
                setIsConnected(true);
                setShowDataChoice(false);
                setPendingConnection(null);
                alert('✅ ¡Conectado con tu equipo!');
            };

            // Conectarse a otro peer
            const connectToPeer = () => {
                if (!peer) {
                    alert('⚠️ Espera un momento, inicializando...');
                    return;
                }

                if (!connectToPeerId.trim()) {
                    alert('⚠️ Ingresa un código de conexión');
                    return;
                }

                setConnectionStatus('connecting');
                
                const conn = peer.connect(connectToPeerId.trim());
                setupConnection(conn);
            };

            // Desconectar
            const disconnect = () => {
                if (connection) {
                    connection.close();
                }
                setIsConnected(false);
                setConnection(null);
                setConnectionStatus('disconnected');
            };

            // ============ FUNCIONES DE GENERAR REPORTE ============
            
            // Generar reporte en imagen
            const generateInventoryReport = () => {
                // Crear canvas
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // Agrupar por proveedor
                const bySupplier = {};
                parts.forEach(part => {
                    const supplierName = part.supplier || 'Sin proveedor';
                    if (!bySupplier[supplierName]) {
                        bySupplier[supplierName] = [];
                    }
                    bySupplier[supplierName].push(part);
                });
                
                const supplierList = Object.keys(bySupplier).sort();
                
                // Calcular altura necesaria
                let totalItems = 0;
                supplierList.forEach(supplier => {
                    totalItems += bySupplier[supplier].length + 2; // +2 para título y espacio
                });
                
                const lineHeight = 30;
                const headerHeight = 120;
                const padding = 40;
                canvas.width = 800;
                canvas.height = headerHeight + (totalItems * lineHeight) + padding;
                
                // Fondo blanco
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Header con gradiente
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                gradient.addColorStop(0, '#1a1a2e');
                gradient.addColorStop(1, '#16213e');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, headerHeight);
                
                // Título
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GUARDIAZ - INVENTARIO', canvas.width / 2, 50);
                
                // Fecha

            // Generar reporte de seriales fabricados
            const generateSerialsReport = () => {

            // Copiar mi ID
            const copyMyId = () => {

            // Generar y mostrar código QR
            const generateQR = () => {

                    alert('⚠️ Espera un momento...');
                    return;
                }
                
                setShowQR(true);
                
                // Esperar a que el div esté en el DOM
                setTimeout(() => {

                        });

            };

            // Escanear código QR (usando cámara)
            const scanQR = () => {
                setShowScanner(true);
                
                setTimeout(() => {
                    const html5QrCode = new Html5Qrcode("qr-reader");
                    
                    html5QrCode.start(

            };

            // Cerrar scanner
            const closeScanner = () => {
                const html5QrCode = new Html5Qrcode("qr-reader");
                html5QrCode.stop().then(() => {
                    setShowScanner(false);
                }).catch(() => {
                    setShowScanner(false);
                });
            };

            // Editar cantidad de un componente
            const editPartQuantity = (id, currentQuantity, partName, unit) => {
                const newQuantity = prompt(
                    `📦 Editar cantidad de "${partName}"\n\n` +
                    `Cantidad actual: ${currentQuantity} ${unit}\n\n` +
                    `Ingresa la nueva cantidad:`,
                    currentQuantity
                );
                
                if (newQuantity === null) return; // Canceló
                
                const qty = parseFloat(newQuantity);
                if (isNaN(qty) || qty < 0) {
                    alert('❌ Cantidad inválida');
                    return;
                }
                
                const updatedParts = parts.map(part => 
                    part.id === id ? { ...part, quantity: qty } : part
                );
                
                setParts(updatedParts);
                saveData(updatedParts, null, null);
                alert(`✅ Cantidad actualizada: ${qty} ${unit}`);
            };

            // Ajustar cantidad (sumar o restar)
            const adjustPartQuantity = (id, adjustment, partName, unit) => {
                const updatedParts = parts.map(part => {
                    if (part.id === id) {
                        const newQty = Math.max(0, part.quantity + adjustment);
                        return { ...part, quantity: newQty };
                    }
                    return part;
                });
                
                setParts(updatedParts);
                saveData(updatedParts, null, null);
            };

            // Agregar componente a la receta en construcción
            const addComponentToRecipe = () => {
                if (!selectedPart || partQuantity <= 0) return;
                
                const part = parts.find(p => p.id === parseInt(selectedPart));
                if (!part) return;

                const existingComponent = newRecipe.components.find(c => c.partId === part.id);
                
                if (existingComponent) {
                    setNewRecipe({
                        ...newRecipe,
                        components: newRecipe.components.map(c => 
                            c.partId === part.id 
                                ? { ...c, quantity: c.quantity + parseFloat(partQuantity) }
                                : c
                        )
                    });
                } else {
                    setNewRecipe({
                        ...newRecipe,
                        components: [...newRecipe.components, {
                            partId: part.id,
                            partName: part.name,
                            quantity: parseFloat(partQuantity),
                            unit: part.unit
                        }]
                    });
                }
                
                setSelectedPart('');
                setPartQuantity(1);
            };

            // Guardar receta
            const saveRecipe = () => {
                if (!newRecipe.name || newRecipe.components.length === 0) return;
                
                const updatedRecipes = [...recipes, { ...newRecipe, id: Date.now() }];
                setRecipes(updatedRecipes);
                saveData(null, updatedRecipes, null);
                setNewRecipe({ name: '', components: [] });
            };

            // Eliminar receta
            const deleteRecipe = (id) => {
                const recipe = recipes.find(r => r.id === id);
                if (!recipe) return;
                
                const confirmDelete = window.confirm(
                    `¿Estás seguro de eliminar la receta "${recipe.name}"?\n\n` +
                    `Esto NO afectará tu inventario actual, solo eliminará la receta.`
                );
                
                if (!confirmDelete) return;
                
                const updatedRecipes = recipes.filter(r => r.id !== id);
                setRecipes(updatedRecipes);
                saveData(null, updatedRecipes, null);
                alert(`✅ Receta "${recipe.name}" eliminada correctamente`);
            };

            // Iniciar edición de receta
            const startEditRecipe = (recipeId) => {
                const recipe = recipes.find(r => r.id === recipeId);
                if (!recipe) return;
                
                setEditingRecipeId(recipeId);
                setEditRecipeForm({
                    name: recipe.name,
                    components: [...recipe.components]
                });
            };

            // Guardar edición de receta
            const saveEditRecipe = () => {
                if (!editRecipeForm.name.trim()) {
                    alert('⚠️ El nombre de la receta no puede estar vacío');
                    return;
                }
                
                if (editRecipeForm.components.length === 0) {
                    alert('⚠️ La receta debe tener al menos un componente');
                    return;
                }
                
                // Verificar si el nombre cambió
                const oldRecipe = recipes.find(r => r.id === editingRecipeId);
                const nameChanged = oldRecipe && oldRecipe.name !== editRecipeForm.name.trim();
                
                // Contar aparatos en historial con el nombre antiguo
                const oldNameCount = nameChanged ? assemblyHistory.filter(h => h.recipeName === oldRecipe.name).length : 0;
                
                // Si cambió el nombre y hay aparatos en historial, preguntar
                let updateHistory = false;
                if (nameChanged && oldNameCount > 0) {
                    updateHistory = window.confirm(
                        `📝 Cambio de nombre detectado\n\n` +
                        `De: "${oldRecipe.name}"\n` +
                        `A: "${editRecipeForm.name.trim()}"\n\n` +
                        `Tienes ${oldNameCount} aparato(s) ensamblado(s) con el nombre antiguo.\n\n` +
                        `¿Quieres actualizar el historial para que todos tengan el nuevo nombre?\n\n` +
                        `✅ SÍ = Unifica todo bajo el nuevo nombre\n` +
                        `❌ NO = Solo cambia la receta, el historial queda igual`
                    );
                }
                
                const updatedRecipes = recipes.map(r => {
                    if (r.id === editingRecipeId) {
                        return {
                            ...r,
                            name: editRecipeForm.name.trim(),
                            components: editRecipeForm.components
                        };
                    }
                    return r;
                });
                
                // Si eligió actualizar el historial
                let updatedHistory = assemblyHistory;
                if (updateHistory) {
                    updatedHistory = assemblyHistory.map(entry => {
                        if (entry.recipeName === oldRecipe.name) {
                            return {
                                ...entry,
                                recipeName: editRecipeForm.name.trim()
                            };
                        }
                        return entry;
                    });
                    setAssemblyHistory(updatedHistory);
                }
                
                setRecipes(updatedRecipes);
                saveData(null, updatedRecipes, updateHistory ? updatedHistory : null);
                setEditingRecipeId(null);
                
                if (updateHistory) {
                    alert(`✅ Receta actualizada\n\n${oldNameCount} aparato(s) del historial actualizados al nuevo nombre`);
                } else {
                    alert('✅ Receta actualizada correctamente');
                }
            };

            // Cancelar edición de receta
            const cancelEditRecipe = () => {
                setEditingRecipeId(null);
            };

            // Agregar componente a receta en edición
            const addComponentToEditRecipe = (partId, quantity) => {
                const part = parts.find(p => p.id === partId);
                if (!part) return;
                
                const alreadyExists = editRecipeForm.components.some(c => c.partId === partId);
                if (alreadyExists) {
                    alert('⚠️ Este componente ya está en la receta');
                    return;
                }
                
                setEditRecipeForm({
                    ...editRecipeForm,
                    components: [...editRecipeForm.components, { partId, quantity: parseFloat(quantity) || 1 }]
                });
            };

            // Eliminar componente de receta en edición
            const removeComponentFromEditRecipe = (partId) => {
                setEditRecipeForm({
                    ...editRecipeForm,
                    components: editRecipeForm.components.filter(c => c.partId !== partId)
                });
            };

            // Actualizar cantidad de componente en receta en edición
            const updateComponentInEditRecipe = (partId, quantity) => {
                setEditRecipeForm({
                    ...editRecipeForm,
                    components: editRecipeForm.components.map(c => 
                        c.partId === partId ? { ...c, quantity: parseFloat(quantity) || 1 } : c
                    )
                });
            };

            // Ensamblar producto
            const assembleProduct = (recipeId, quantity = 1) => {
                const recipe = recipes.find(r => r.id === recipeId);
                if (!recipe) return;

                const serialNumber = serialNumbers[recipeId] || '';

                // Validar serial
                if (!serialNumber || serialNumber.length !== 4 || !/^\d{4}$/.test(serialNumber)) {
                    alert('⚠️ Debes ingresar un serial de 4 dígitos numéricos');
                    return;
                }

                // Verificar si el serial ya existe
                const serialExists = assemblyHistory.some(h => h.serialNumber === serialNumber);
                if (serialExists) {
                    alert(`❌ El serial #${serialNumber} ya fue usado.\n\nCada aparato debe tener un serial único.`);
                    return;
                }

                // Verificar disponibilidad
                const unavailable = [];
                for (const component of recipe.components) {
                    const part = parts.find(p => p.id === component.partId);
                    if (!part || part.quantity < component.quantity * quantity) {
                        unavailable.push({
                            name: component.partName,
                            needed: component.quantity * quantity,
                            available: part?.quantity || 0
                        });
                    }
                }

                if (unavailable.length > 0) {
                    const message = unavailable.map(u => 
                        `${u.name}: necesitas ${u.needed}, tienes ${u.available}`
                    ).join('\n');
                    alert(`⚠️ Stock insuficiente:\n\n${message}`);
                    return;
                }

                // Calcular costo del ensamblaje
                const recipeCost = calculateRecipeCost(recipe);

                // Descontar componentes
                const updatedParts = parts.map(part => {
                    const component = recipe.components.find(c => c.partId === part.id);
                    if (component) {
                        return { ...part, quantity: part.quantity - (component.quantity * quantity) };
                    }
                    return part;
                });

                // Registrar en historial CON SERIAL
                const historyEntry = {
                    id: Date.now(),
                    recipeName: recipe.name,
                    quantity: quantity,
                    serialNumber: serialNumber,
                    timestamp: new Date().toLocaleString('es-MX'),
                    totalCost: recipeCost * quantity,
                    unitCost: recipeCost,
                    components: recipe.components.map(c => ({
                        name: c.partName,
                        quantity: c.quantity * quantity,
                        unit: c.unit
                    }))
                };

                const updatedHistory = [historyEntry, ...assemblyHistory]; // Sin límite

                setParts(updatedParts);
                setAssemblyHistory(updatedHistory);
                saveData(updatedParts, null, updatedHistory);

                alert(`✅ Aparato #${serialNumber} ensamblado correctamente\n\n${quantity} ${recipe.name}(s)`);
                // Limpiar serial de esta receta específica
                setSerialNumbers(prev => ({
                    ...prev,
                    [recipeId]: ''
                }));
            };

            // Toggle componentes en recetas (Ensamblar)
            const toggleRecipeComponents = (recipeId) => {
                setExpandedRecipes(prev => ({
                    ...prev,
                    [recipeId]: !prev[recipeId]
                }));
            };

            // Toggle componentes en historial
            const toggleHistoryComponents = (entryId) => {
                setExpandedHistory(prev => ({
                    ...prev,
                    [entryId]: !prev[entryId]
                }));
            };

            // Función para ordenar historial
            const getSortedHistory = () => {
                const filtered = assemblyHistory.filter(entry => !searchSerial || entry.serialNumber?.includes(searchSerial));
                
                if (historySortBy === 'serial') {
                    return [...filtered].sort((a, b) => {
                        const serialA = parseInt(a.serialNumber) || 0;
                        const serialB = parseInt(b.serialNumber) || 0;
                        return serialB - serialA; // Mayor a menor
                    });
                } else if (historySortBy === 'type') {
                    return [...filtered].sort((a, b) => a.recipeName.localeCompare(b.recipeName));
                } else {
                    // Por fecha (más reciente primero) - default
                    return filtered;
                }
            };

            // Función para filtrar reportes por tiempo
            const getFilteredReports = () => {
                const now = new Date();
                
                return assemblyHistory.filter(entry => {
                    if (!entry.timestamp) return false;
                    
                    // Parse timestamp "17/2/2026, 5:44:20 p.m."
                    const parts = entry.timestamp.split(',')[0].split('/');
                    const day = parseInt(parts[0]);
                    const month = parseInt(parts[1]) - 1;
                    const year = parseInt(parts[2]);
                    const entryDate = new Date(year, month, day);
                    
                    if (reportsFilter === 'week') {
                        const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                        return entryDate >= weekAgo;
                    } else if (reportsFilter === 'month') {
                        return entryDate.getMonth() === now.getMonth() && 
                               entryDate.getFullYear() === now.getFullYear();
                    } else if (reportsFilter === 'year') {
                        return entryDate.getFullYear() === now.getFullYear();
                    }
                    return true; // 'all'
                });
            };

            // Función para obtener desglose por período
            const getPeriodBreakdown = (filteredData) => {
                if (filteredData.length === 0) return [];
                
                const parseDate = (timestamp) => {
                    const parts = timestamp.split(',')[0].split('/');
                    const day = parseInt(parts[0]);
                    const month = parseInt(parts[1]) - 1;
                    const year = parseInt(parts[2]);
                    return new Date(year, month, day);
                };
                
                const breakdown = {};
                
                if (reportsFilter === 'week') {
                    // Desglose por DÍA
                    filteredData.forEach(entry => {
                        const date = parseDate(entry.timestamp);
                        const dayKey = `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()}`;
                        const dayName = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'][date.getDay()];
                        const label = `${dayName} ${date.getDate()}/${date.getMonth() + 1}`;
                        
                        if (!breakdown[dayKey]) {
                            breakdown[dayKey] = { label, count: 0, cost: 0, types: {} };
                        }
                        breakdown[dayKey].count += entry.quantity;
                        breakdown[dayKey].cost += entry.totalCost || 0;
                        breakdown[dayKey].types[entry.recipeName] = (breakdown[dayKey].types[entry.recipeName] || 0) + entry.quantity;
                    });
                } else if (reportsFilter === 'month') {
                    // Desglose por SEMANA
                    filteredData.forEach(entry => {
                        const date = parseDate(entry.timestamp);
                        const weekNum = Math.ceil(date.getDate() / 7);
                        const startDay = (weekNum - 1) * 7 + 1;
                        const endDay = Math.min(weekNum * 7, new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate());
                        const weekKey = `${date.getFullYear()}-${date.getMonth()}-${weekNum}`;
                        const label = `Semana ${weekNum} (${startDay}-${endDay} ${['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][date.getMonth()]})`;
                        
                        if (!breakdown[weekKey]) {
                            breakdown[weekKey] = { label, count: 0, cost: 0, types: {} };
                        }
                        breakdown[weekKey].count += entry.quantity;
                        breakdown[weekKey].cost += entry.totalCost || 0;
                        breakdown[weekKey].types[entry.recipeName] = (breakdown[weekKey].types[entry.recipeName] || 0) + entry.quantity;
                    });
                } else if (reportsFilter === 'year') {
                    // Desglose por MES
                    filteredData.forEach(entry => {
                        const date = parseDate(entry.timestamp);
                        const monthKey = `${date.getFullYear()}-${date.getMonth()}`;
                        const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
                        const label = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;
                        
                        if (!breakdown[monthKey]) {
                            breakdown[monthKey] = { label, count: 0, cost: 0, types: {} };
                        }
                        breakdown[monthKey].count += entry.quantity;
                        breakdown[monthKey].cost += entry.totalCost || 0;
                        breakdown[monthKey].types[entry.recipeName] = (breakdown[monthKey].types[entry.recipeName] || 0) + entry.quantity;
                    });
                } else {
                    // Desglose por AÑO
                    filteredData.forEach(entry => {
                        const date = parseDate(entry.timestamp);
                        const yearKey = date.getFullYear().toString();
                        const label = `Año ${yearKey}`;
                        
                        if (!breakdown[yearKey]) {
                            breakdown[yearKey] = { label, count: 0, cost: 0, types: {} };
                        }
                        breakdown[yearKey].count += entry.quantity;
                        breakdown[yearKey].cost += entry.totalCost || 0;
                        breakdown[yearKey].types[entry.recipeName] = (breakdown[yearKey].types[entry.recipeName] || 0) + entry.quantity;
                    });
                }
                
                return Object.values(breakdown);
            };

            // Eliminar ensamblaje del historial y devolver piezas
            const deleteAssembly = (entryId) => {
                const entry = assemblyHistory.find(e => e.id === entryId);
                if (!entry) return;
                
                const confirmDelete = window.confirm(
                    `¿Eliminar el aparato #${entry.serialNumber}?\n\n` +
                    `${entry.recipeName}\n` +
                    `${entry.timestamp}\n\n` +
                    `✅ Las piezas usadas REGRESARÁN al inventario\n\n` +
                    `¿Continuar?`
                );
                
                if (!confirmDelete) return;
                
                // Devolver componentes al inventario
                const updatedParts = parts.map(part => {
                    const component = entry.components.find(c => c.name === part.name);
                    if (component) {
                        return { ...part, quantity: part.quantity + component.quantity };
                    }
                    return part;
                });
                
                // Eliminar del historial
                const updatedHistory = assemblyHistory.filter(e => e.id !== entryId);
                
                setParts(updatedParts);
                setAssemblyHistory(updatedHistory);
                saveData(updatedParts, recipes, updatedHistory);
                
                alert(`✅ Aparato #${entry.serialNumber} eliminado\n\nLas piezas regresaron al inventario`);
            };

            // Remover componente de receta en construcción
            const removeComponentFromRecipe = (partId) => {
                setNewRecipe({
                    ...newRecipe,
                    components: newRecipe.components.filter(c => c.partId !== partId)
                });
            };

            // Calcular costo total de una receta
            const calculateRecipeCost = (recipe) => {
                return recipe.components.reduce((total, comp) => {
                    const part = parts.find(p => p.id === comp.partId);
                    const price = part?.price || 0;
                    return total + (price * comp.quantity);
                }, 0);
            };

            const disassembleProduct = (recipeId, quantity = 1) => {
                const recipe = recipes.find(r => r.id === recipeId);
                if (!recipe) return;

                const confirmDisassemble = window.confirm(
                    `¿Quieres desensamblar ${quantity} unidad(es) de "${recipe.name}"?\n\n` +
                    `Esto DEVOLVERÁ los componentes a tu inventario.`
                );

                // Agregar componentes de vuelta al inventario

                    const component = recipe.components.find(c => c.partId === part.id);
                    if (component) {
                        return { ...part, quantity: part.quantity + (component.quantity * quantity) };
                    }
                    return part;
                });

                // Registrar en historial
                const historyEntry = {
                    id: Date.now(),
                    recipeName: recipe.name + " (Desensamblado)",
                    quantity: quantity,
                    timestamp: new Date().toLocaleString('es-MX'),
                    totalCost: -(calculateRecipeCost(recipe) * quantity),
                    unitCost: -calculateRecipeCost(recipe),
                    components: recipe.components.map(c => ({
                        name: c.partName,
                        quantity: c.quantity * quantity,
                        unit: c.unit
                    }))
                };

                const updatedHistory = [historyEntry, ...assemblyHistory]; // Sin límite

                setParts(updatedParts);
                setAssemblyHistory(updatedHistory);
                saveData(updatedParts, null, updatedHistory);

                alert(`✅ ${quantity} ${recipe.name}(s) desensamblado(s). Componentes devueltos al inventario.`);

                                            {stockToAdd && !isNaN(parseFloat(stockToAdd)) && parseFloat(stockToAdd) > 0 && (
                                                <div className="bg-blue-50 border border-blue-200 rounded p-3 mb-4">
                                                    <p className="text-sm text-blue-700">
                                                        <strong>Nuevo total:</strong> {part.quantity + parseFloat(stockToAdd)} {part.unit}
                                                    </p>
                                                </div>
                                            )}
                                            
                                            <div className="flex gap-3">
                                                <button
                                                    onClick={() => saveAddedStock(part.id)}
                                                    className="flex-1 bg-green-600 text-white px-6 py-3 rounded font-semibold hover:bg-green-700"
                                                >
                                                    ✓ Agregar
                                                </button>
                                                <button
                                                    onClick={cancelAddStock}
                                                    className="flex-1 bg-gray-300 text-gray-700 px-6 py-3 rounded font-semibold hover:bg-gray-400"
                                                >
                                                    Cancelar
                                                </button>
                                            </div>
                                        </>
                                    );
                                })()}
                            </div>
                        </div>
                    )}
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<InventorySystem />);
    </script>
</body>
<script>
// Registrar Service Worker para PWA
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
            .then(registration => {
                console.log('✅ Service Worker registrado:', registration.scope);
            })
            .catch(error => {
                console.log('❌ Error al registrar Service Worker:', error);
            });
    });
}

// Detectar si la app ya está instalada
let deferredPrompt;
const installPrompt = document.createElement('div');
installPrompt.className = 'install-prompt';
installPrompt.innerHTML = `
    <div style="display: flex; align-items: center; gap: 16px;">
        <div>
            <div style="font-weight: bold; margin-bottom: 4px;">📦 Instalar App</div>
            <div style="font-size: 14px; opacity: 0.9;">Instala esta app en tu celular para usarla offline</div>
        </div>
        <button id="install-btn" style="background: white; color: #2563eb; padding: 8px 16px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer;">
            Instalar
        </button>
        <button id="dismiss-btn" style="background: transparent; color: white; padding: 8px; border: none; cursor: pointer; font-size: 20px;">
            ×
        </button>
    </div>
`;
document.body.appendChild(installPrompt);

// Escuchar el evento beforeinstallprompt
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    
    // Mostrar el prompt de instalación solo si no está instalada
    if (!window.matchMedia('(display-mode: standalone)').matches) {
        installPrompt.style.display = 'block';
    }
});

// Manejar el click en instalar
document.addEventListener('click', (e) => {
    if (e.target.id === 'install-btn') {
        installPrompt.style.display = 'none';
        
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('✅ Usuario aceptó instalar');
                } else {
                    console.log('❌ Usuario rechazó instalar');
                }
                deferredPrompt = null;
            });
        }
    }
    
    if (e.target.id === 'dismiss-btn') {
        installPrompt.style.display = 'none';
    }
});

// Detectar cuando la app se instala
window.addEventListener('appinstalled', () => {
    console.log('✅ ¡App instalada con éxito!');
    installPrompt.style.display = 'none';
});
</script>
</html>
